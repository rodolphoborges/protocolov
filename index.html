<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo V - Início</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-content">
            <img src="https://i.ibb.co/LzdZpXQ/7994685b-e490-449e-9907-7d6718919630.png" alt="Logo Protocolo V" class="logo">
            <nav>
                <ul>
                    <li><a href="index.html" class="active">Painel</a></li>
                    <li><a href="treino.html">Treinos</a></li>
                    <li><a href="briefing.html">Briefings</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="player-profile">
            <div class="profile-card">
                <div class="profile-header">
                    <img id="player-photo" src="https://via.placeholder.com/150" alt="Foto do Jogador">
                    <div class="player-info">
                        <h2 id="player-name">Carregando...</h2>
                        <p id="player-role">Recruta</p>
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">Nível</span>
                        <span id="player-level" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">XP Total</span>
                        <span id="player-xp" class="stat-value">0</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="announcements">
            <h3>Comunicados Recentes</h3>
            <div id="announcements-container">
                <p>Buscando atualizações do comando...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Protocolo V - Sistema de Gestão de Operações</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
